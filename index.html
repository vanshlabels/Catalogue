<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vansh Labels — Product Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#16224a;
  --red:#c81e2c;
  --bg:#faf9f6;
  --card-bg:#ffffff;
  --header-bg:rgba(250,249,246,0.92);
  --ink:#20232b;
  --muted:#6b7078;
  --line:#e7e5df;
  --row-hover:#faf8f3;
  --font-head:'Fraunces',serif;
  --font-body:'Inter',sans-serif;
  --head-weight:600;
  --head-tracking:normal;
  --accent-style:italic;
  --card-radius:14px;
  --btn-radius:100px;
  --card-shadow:0 2px 10px rgba(22,34,74,.05);
  --card-shadow-hover:0 16px 32px rgba(22,34,74,.12);
  --logo-h:34px;
  --hero-pad-y:64px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
h1,h2{font-family:var(--font-head);color:var(--navy);margin:0;}
img{max-width:100%;display:block;}

/* Buttons */
.btn{border:none;cursor:pointer;font-size:12.5px;font-weight:600;padding:9px 18px;border-radius:var(--btn-radius);transition:opacity .15s, transform .1s;font-family:var(--font-body);}
.btn:active{transform:scale(.97);}
.btn-outline{background:transparent;border:1px solid var(--navy);color:var(--navy);}
.btn-outline:hover{background:var(--navy);color:#fff;}
.btn-solid{background:var(--red);color:#fff;}
.btn-solid:hover{opacity:.88;}
.link-btn{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0;font-family:var(--font-body);}
.link-btn:hover{color:var(--red);}

/* Header */
header.site{position:sticky;top:0;z-index:40;background:var(--header-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.header-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:16px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:11px;}
.brand-icon{height:var(--logo-h);width:auto;display:block;}
.brand-text{display:flex;flex-direction:column;line-height:1.2;}
.brand-name{font-family:var(--font-head);font-weight:var(--head-weight);font-size:15px;color:var(--navy);letter-spacing:.05em;text-transform:uppercase;}
.brand-tag{font-size:10px;color:var(--muted);font-style:var(--accent-style);letter-spacing:.01em;}
.header-actions{display:flex;align-items:center;gap:10px;}
.search-box{position:relative;}
.search-box input{border:1px solid var(--line);background:#fff;border-radius:100px;padding:9px 16px 9px 34px;font-size:13px;width:200px;outline:none;font-family:var(--font-body);transition:width .2s, border-color .2s;}
.search-box input:focus{width:250px;border-color:var(--navy);}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);}

/* Hero */
.hero{position:relative;overflow:hidden;padding:var(--hero-pad-y) 0 56px;background:linear-gradient(135deg,var(--navy) 0%,#241a3f 50%,#5c1c2e 100%);}
.hero-pattern{
  position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.10;
  background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='140'%20height='140'%3E%3Cg%20fill='white'%3E%3Cg%20transform='translate(14,10)%20rotate(18)%20scale(1.15)'%3E%3Cpath%20d='M20.59%2013.41%2012%2022%202%2012V2h10l8.59%208.59a2%202%200%200%201%200%202.82Z'/%3E%3Ccircle%20cx='7'%20cy='7'%20r='1.5'/%3E%3C/g%3E%3Cg%20transform='translate(78,64)%20rotate(-24)%20scale(0.85)'%3E%3Cpath%20d='M20.59%2013.41%2012%2022%202%2012V2h10l8.59%208.59a2%202%200%200%201%200%202.82Z'/%3E%3Ccircle%20cx='7'%20cy='7'%20r='1.5'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  background-size:140px 140px;background-repeat:repeat;
}
.hero-blob{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;}
.hero-blob-1{width:340px;height:340px;top:-120px;right:-60px;background:radial-gradient(circle,rgba(232,176,75,.5),transparent 70%);}
.hero-blob-2{width:300px;height:300px;bottom:-140px;left:-60px;background:radial-gradient(circle,rgba(200,30,44,.5),transparent 70%);}
.hero-inner{position:relative;z-index:1;}
.hero h1{font-size:clamp(30px,4.4vw,48px);line-height:1.14;margin:0 0 16px;font-weight:var(--head-weight);letter-spacing:var(--head-tracking);color:#fff;}
.hero h1 em{font-style:var(--accent-style);color:#f0b93d;}
.hero p.lede{font-size:15.5px;color:rgba(255,255,255,.78);max-width:540px;margin:0 0 8px;line-height:1.7;}
.hero-edit-link{color:rgba(255,255,255,.55) !important;margin-bottom:26px;display:inline-block;}
.hero-edit-link:hover{color:#fff !important;}
.hero-stats{display:grid;gap:0;margin-top:22px;max-width:560px;}
.stat{padding:0 24px;border-left:1px solid rgba(255,255,255,.22);text-align:left;}
.stat:first-child{padding-left:0;border-left:none;}
.stat .num{display:block;font-family:var(--font-head);font-size:clamp(20px,3vw,26px);font-weight:var(--head-weight);color:#fff;line-height:1;}
.stat .lbl{display:block;font-size:10.5px;color:#f0b93d;text-transform:uppercase;letter-spacing:.07em;margin-top:7px;font-weight:600;}
.stat-admin{display:flex;gap:8px;margin-top:8px;}
.stat-admin button{background:none;border:none;font-size:10px;color:rgba(255,255,255,.55);cursor:pointer;text-decoration:underline;padding:0;}
.stat-admin button:hover{color:#fff;}
.hero-add-stat{color:rgba(255,255,255,.65) !important;margin-top:18px;}
.hero-add-stat:hover{color:#fff !important;}
@media(max-width:480px){.hero-stats{max-width:100%;}.stat{padding:0 14px;}}

/* Product gallery: explicit slot grid so it reads as multi-photo, not single */
.prod-thumbs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px;}
@media(max-width:420px){.prod-thumbs{grid-template-columns:repeat(4,1fr);}}
.prod-thumb-wrap{position:relative;aspect-ratio:1/1;}
.prod-thumb-btn{width:100%;height:100%;border-radius:8px;overflow:hidden;padding:0;border:2px solid transparent;cursor:pointer;background:none;}
.prod-thumb-wrap.is-primary .prod-thumb-btn{border-color:var(--red);}
.prod-thumb-btn img{width:100%;height:100%;object-fit:cover;}
.prod-thumb-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--navy);color:#fff;border:none;font-size:12px;line-height:1;cursor:pointer;}
.prod-thumb-add{aspect-ratio:1/1;border:1.5px dashed var(--line);border-radius:8px;background:none;color:var(--muted);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.prod-thumb-add:hover{border-color:var(--navy);color:var(--navy);}
.gallery-hint{font-size:11.5px;color:var(--muted);margin:10px 0 0;line-height:1.5;}

/* Section head */
.section-head{display:flex;align-items:center;justify-content:space-between;margin:38px 0 18px;gap:12px;}
.section-head h2{font-size:22px;font-weight:var(--head-weight);letter-spacing:var(--head-tracking);}

/* Category grid (home) */
.cat-grid-section{padding:6px 0 10px;}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media(min-width:760px){.cat-grid{grid-template-columns:repeat(3,1fr);gap:22px;}}
.cat-tile{display:flex;flex-direction:column;background:var(--card-bg);border:1px solid var(--line);border-radius:var(--card-radius);overflow:hidden;box-shadow:var(--card-shadow);transition:transform .18s, box-shadow .18s;}
.cat-tile:hover{transform:translateY(-3px);box-shadow:var(--card-shadow-hover);}
.tile-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:#eee;}
.icon-tile{display:flex;align-items:center;justify-content:center;}
.cat-tile-name{font-family:var(--font-head);font-weight:var(--head-weight);font-size:15.5px;color:var(--navy);padding:14px 14px 2px;letter-spacing:var(--head-tracking);}
.cat-tile-desc{font-size:12.5px;color:var(--muted);padding:5px 14px 16px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.9em;}
.add-cat-cta{text-align:center;padding:26px 0 10px;}

/* Category page */
.cat-page{padding:32px 0 10px;}
.back-link{display:inline-block;font-size:12.5px;color:var(--muted);margin-bottom:22px;font-weight:600;}
.back-link:hover{color:var(--navy);}
.cat-head{display:flex;gap:28px;align-items:center;flex-wrap:wrap;padding-bottom:8px;}
.head-img{width:220px;height:220px;border-radius:var(--card-radius);object-fit:cover;flex:0 0 220px;background:#eee;}
.cat-head-info{flex:1;min-width:240px;}
.cat-head-info h1{font-size:28px;margin-bottom:10px;font-weight:var(--head-weight);letter-spacing:var(--head-tracking);}
.cat-head-info p{font-size:14.5px;color:var(--muted);line-height:1.7;max-width:600px;margin:0;}

/* Product list rows */
.prod-list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--line);}
.prod-row{display:flex;align-items:center;gap:18px;padding:16px 4px;border-bottom:1px solid var(--line);transition:background .15s;}
.prod-row:hover{background:var(--row-hover);}
.row-img{width:64px;height:64px;border-radius:10px;object-fit:cover;flex:0 0 64px;background:#eee;}
.prod-row-name{font-family:var(--font-head);font-weight:var(--head-weight);font-size:15.5px;color:var(--navy);}
.prod-row-desc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5;}

/* Product page */
.prod-page{padding:32px 0 10px;}
.prod-main{display:flex;gap:40px;flex-wrap:wrap;padding-bottom:20px;}
.prod-gallery{flex:1 1 360px;min-width:280px;}
.prod-primary{width:100%;aspect-ratio:1/1;border-radius:var(--card-radius);overflow:hidden;background:#eee;}
.prod-primary img{width:100%;height:100%;object-fit:cover;}
.prod-info{flex:1 1 320px;min-width:280px;}
.prod-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:8px;}
.prod-info h1{font-size:28px;margin-bottom:14px;font-weight:var(--head-weight);}
.prod-info p{font-size:14.5px;color:var(--muted);line-height:1.75;margin:0 0 16px;max-width:520px;}

.related-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media(min-width:760px){.related-grid{grid-template-columns:repeat(4,1fr);}}

/* Admin controls */
.admin-row{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
.admin-row button{background:none;border:none;font-size:11.5px;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0;font-family:var(--font-body);}
.admin-row button:hover{color:var(--navy);}
.admin-row button.danger,.admin-row .danger{color:#b23a3a;}
.admin-bar{position:fixed;bottom:0;left:0;right:0;background:var(--navy);color:#fff;padding:12px 20px;display:flex;justify-content:center;gap:14px;align-items:center;z-index:60;font-size:12.5px;text-align:center;}

/* What Sets Us Apart */
.apart-section{padding-top:10px;}
.apart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media(min-width:760px){.apart-grid{grid-template-columns:repeat(3,1fr);}}
.apart-card{background:var(--card-bg);border:1px solid var(--line);border-radius:var(--card-radius);padding:18px;}
.apart-mark img{width:22px;height:22px;object-fit:contain;margin-bottom:10px;}
.apart-title{font-family:var(--font-head);font-weight:var(--head-weight);font-size:14.5px;color:var(--navy);margin-bottom:4px;}
.apart-desc{font-size:12.5px;color:var(--muted);line-height:1.55;}

/* FAQ */
.faq-section{padding-bottom:20px;}
.faq-list{border-top:1px solid var(--line);}
.faq-item{border-bottom:1px solid var(--line);padding:14px 2px;}
.faq-item summary{cursor:pointer;font-family:var(--font-head);font-weight:var(--head-weight);font-size:14.5px;color:var(--navy);list-style:none;}
.faq-item summary::-webkit-details-marker{display:none;}
.faq-item summary::before{content:'+ ';color:var(--red);font-weight:700;}
.faq-item[open] summary::before{content:'– ';}
.faq-item p{font-size:13.5px;color:var(--muted);line-height:1.65;margin:10px 0 0;max-width:640px;}

/* Footer */
footer{padding:40px 0 90px;margin-top:20px;}
.foot-row{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:24px;}
.foot-brand{font-family:var(--font-head);font-size:13px;letter-spacing:.08em;color:var(--navy);font-weight:700;text-transform:uppercase;}
.foot-contact{display:flex;gap:20px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);}
.foot-note{font-size:11.5px;color:#9a9da3;margin-top:16px;}

.empty-state{padding:60px 20px;text-align:center;color:var(--muted);grid-column:1/-1;}

@media(max-width:640px){
  .cat-head{flex-direction:column;align-items:flex-start;}
  .head-img{width:100%;flex-basis:auto;aspect-ratio:16/9;height:auto;}
  .search-box input{width:130px;}
  .search-box input:focus{width:160px;}
}

.faq-item summary{font-size:15px;}
.apart-card{transition:transform .15s;}
.apart-card:hover{transform:translateY(-2px);}
</style>
</head>

const LOGO_SRC = 'data:image/png;base64,' + BUNDLE.logo;
const ICON_SRC = 'data:image/png;base64,' + BUNDLE.icon;
const EDIT_CODE = 'vansh123';

function tagIconSVG() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:36%;height:36%;">
    <path d="M20.59 13.41 12 22 2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82Z"/>
    <circle cx="7" cy="7" r="1.4" fill="#fff" stroke="none"/>
  </svg>`;
}

let state = {
  data: null,
  isAdmin: false,
  query: '',
  route: { name: 'home' }
};

function cloneDefault() {
  return JSON.parse(JSON.stringify(BUNDLE.data));
}

function uid(prefix) {
  return prefix + '_' + Math.random().toString(36).slice(2, 9);
}

/* ---------- Firebase load / save / live sync ---------- */
function migrateData(loaded) {
  const def = cloneDefault();
  if (!loaded || typeof loaded !== 'object') return def;
  const out = {};

  if (Array.isArray(loaded.categories) && loaded.categories.length) {
    out.categories = loaded.categories.map(c => ({
      id: c.id || uid('cat'),
      name: c.name || 'Category',
      color: c.color || '#334',
      img: c.img || '',
      shortDesc: c.shortDesc || c.desc || '',
      mediumDesc: c.mediumDesc || c.desc || '',
      products: Array.isArray(c.products) ? c.products.map(p => ({
        id: p.id || uid('prod'),
        name: p.name || 'Product',
        shortDesc: p.shortDesc || p.desc || '',
        fullDesc: p.fullDesc || p.desc || '',
        photos: Array.isArray(p.photos) ? p.photos : []
      })) : []
    }));
  } else {
    out.categories = def.categories;
  }

  if (Array.isArray(loaded.whatSetsApart) && loaded.whatSetsApart.length) {
    out.whatSetsApart = loaded.whatSetsApart;
  } else if (Array.isArray(loaded.whyChoose) && loaded.whyChoose.length) {
    out.whatSetsApart = loaded.whyChoose.map(w => ({ title: String(w), desc: '' }));
  } else {
    out.whatSetsApart = def.whatSetsApart;
  }

  out.faqs = Array.isArray(loaded.faqs) && loaded.faqs.length ? loaded.faqs : def.faqs;
  out.contact = (loaded.contact && loaded.contact.phone) ? loaded.contact : def.contact;
  out.heroTitleMain = loaded.heroTitleMain || def.heroTitleMain;
  out.heroTitleAccent = loaded.heroTitleAccent || def.heroTitleAccent;
  out.heroLede = loaded.heroLede || def.heroLede;
  out.heroStats = (Array.isArray(loaded.heroStats) && loaded.heroStats.length) ? loaded.heroStats : def.heroStats;

  return out;
}

let needsResave = false;

async function loadData() {
  if (firebaseAvailable) {
    try {
      const snap = await fbRefs.getDoc(fbRefs.catalogDocRef);
      if (snap.exists() && snap.data() && snap.data().json) {
        const raw = JSON.parse(snap.data().json);
        state.data = migrateData(raw);
        needsResave = !('heroStats' in raw) || !('whatSetsApart' in raw);
        return;
      }
    } catch (e) {
      console.error('Could not load catalogue data from Firebase, using defaults', e);
    }
  }
  state.data = cloneDefault();
}

async function saveData() {
  if (!firebaseAvailable) {
    alert('Changes are shown here but could not be saved online right now (no connection to the database). Try again once you have an internet connection, or check this on the live website.');
    return;
  }
  try {
    await fbRefs.setDoc(fbRefs.catalogDocRef, { json: JSON.stringify(state.data), updatedAt: Date.now() });
  } catch (e) {
    console.error('Could not save catalogue changes', e);
    alert('Sorry — your change could not be saved. Please check your internet connection and try again.');
  }
}

/* ---------- Routing ---------- */
function parseHash() {
  const h = location.hash.replace(/^#\/?/, '');
  const parts = h.split('/').filter(Boolean);
  if (parts[0] === 'category' && parts[1]) {
    state.route = { name: 'category', catId: decodeURIComponent(parts[1]) };
  } else if (parts[0] === 'product' && parts[1] && parts[2]) {
    state.route = { name: 'product', catId: decodeURIComponent(parts[1]), prodId: decodeURIComponent(parts[2]) };
  } else {
    state.route = { name: 'home' };
  }
}

function goTo(hash) {
  window.scrollTo(0, 0);
  location.hash = hash;
}

window.addEventListener('hashchange', () => {
  parseHash();
  render();
  window.scrollTo(0, 0);
});

/* ---------- Helpers ---------- */
function findCategory(catId) {
  return state.data.categories.find(c => c.id === catId);
}
function findProduct(catId, prodId) {
  const cat = findCategory(catId);
  if (!cat) return null;
  return cat.products.find(p => p.id === prodId) || null;
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}
function matchesQuery(cat, q) {
  if (!q) return true;
  q = q.toLowerCase();
  if (cat.name.toLowerCase().includes(q)) return true;
  if (cat.shortDesc.toLowerCase().includes(q)) return true;
  return cat.products.some(p => p.name.toLowerCase().includes(q) || p.shortDesc.toLowerCase().includes(q));
}
function catThumb(cat, sizeClass) {
  if (cat.img) return `<img class="${sizeClass}" src="${cat.img}" alt="${escapeHtml(cat.name)}">`;
  return `<div class="${sizeClass} icon-tile" style="background:${cat.color || '#334'};">${tagIconSVG()}</div>`;
}
function prodThumb(cat, prod, sizeClass) {
  const src = (prod.photos && prod.photos[0]) ? prod.photos[0] : cat.img;
  if (src) return `<img class="${sizeClass}" src="${src}" alt="${escapeHtml(prod.name)}">`;
  return `<div class="${sizeClass} icon-tile" style="background:${cat.color || '#334'};">${tagIconSVG()}</div>`;
}

/* ---------- Admin: auth ---------- */
function enterAdmin() {
  const code = prompt('Enter the catalogue edit code to make changes:');
  if (code === null) return;
  if (code.trim() === EDIT_CODE) {
    state.isAdmin = true;
    render();
  } else {
    alert('That code is not correct.');
  }
}
function exitAdmin() {
  state.isAdmin = false;
  render();
}
async function resetCatalog() {
  if (!confirm('Reset the entire catalogue back to the original Vansh Labels content? This cannot be undone.')) return;
  state.data = cloneDefault();
  await saveData();
  render();
}

/* ---------- Category CRUD ---------- */
async function addCategory() {
  const name = prompt('New category name (e.g. "Care Labels"):');
  if (!name || !name.trim()) return;
  const shortDesc = prompt('Short description (max 20 words, shown on the home page):', '') || '';
  const mediumDesc = prompt('Medium description (shown on the category page):', shortDesc) || '';
  state.data.categories.push({
    id: uid('cat'), name: name.trim(), img: '', color: '#334', shortDesc: shortDesc.trim(), mediumDesc: mediumDesc.trim(), products: []
  });
  await saveData();
  render();
}
async function editCategoryText(catId) {
  const cat = findCategory(catId);
  if (!cat) return;
  const name = prompt('Category name:', cat.name);
  if (name === null) return;
  const shortDesc = prompt('Short description (max 20 words, home page):', cat.shortDesc);
  if (shortDesc === null) return;
  const mediumDesc = prompt('Medium description (category page):', cat.mediumDesc);
  if (mediumDesc === null) return;
  cat.name = name.trim();
  cat.shortDesc = shortDesc.trim();
  cat.mediumDesc = mediumDesc.trim();
  await saveData();
  render();
}
function editCategoryImage(catId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      const cat = findCategory(catId);
      cat.img = reader.result;
      await saveData();
      render();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}
async function deleteCategory(catId) {
  const cat = findCategory(catId);
  if (!cat) return;
  if (!confirm(`Delete the "${cat.name}" category and all its products?`)) return;
  state.data.categories = state.data.categories.filter(c => c.id !== catId);
  await saveData();
  goTo('#/');
}

/* ---------- Product CRUD ---------- */
async function addProduct(catId) {
  const cat = findCategory(catId);
  if (!cat) return;
  const name = prompt('New product / variant name:');
  if (!name || !name.trim()) return;
  const shortDesc = prompt('Short description (shown in the category list):', '') || '';
  const fullDesc = prompt('Full description (shown on the product page):', shortDesc) || '';
  cat.products.push({ id: uid('prod'), name: name.trim(), shortDesc: shortDesc.trim(), fullDesc: fullDesc.trim(), photos: [] });
  await saveData();
  render();
}
async function editProductText(catId, prodId) {
  const prod = findProduct(catId, prodId);
  if (!prod) return;
  const name = prompt('Product name:', prod.name);
  if (name === null) return;
  const shortDesc = prompt('Short description:', prod.shortDesc);
  if (shortDesc === null) return;
  const fullDesc = prompt('Full description:', prod.fullDesc);
  if (fullDesc === null) return;
  prod.name = name.trim();
  prod.shortDesc = shortDesc.trim();
  prod.fullDesc = fullDesc.trim();
  await saveData();
  render();
}
async function deleteProduct(catId, prodId) {
  const cat = findCategory(catId);
  if (!cat) return;
  if (!confirm('Remove this product from the catalogue?')) return;
  cat.products = cat.products.filter(p => p.id !== prodId);
  await saveData();
  goTo('#/category/' + encodeURIComponent(catId));
}
function addProductPhotos(catId, prodId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  input.onchange = async () => {
    const files = Array.from(input.files || []);
    if (!files.length) return;
    const readers = files.map(file => new Promise((resolve) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.readAsDataURL(file);
    }));
    const results = await Promise.all(readers);
    const prod = findProduct(catId, prodId);
    prod.photos = (prod.photos || []).concat(results);
    await saveData();
    render();
  };
  input.click();
}
async function removeProductPhoto(catId, prodId, idx) {
  const prod = findProduct(catId, prodId);
  if (!prod) return;
  if (!confirm('Remove this photo?')) return;
  prod.photos.splice(idx, 1);
  await saveData();
  render();
}

            ${state.isAdmin ? `<div class="admin-row">
              <button onclick="editProductText('${cat.id}','${prod.id}')">Edit text</button>

            </div>` : ''}
          </div>
        </div>

        ${others.length ? `
        <div class="section-head"><h2>More from ${escapeHtml(cat.name)}</h2></div>
        <div class="related-grid">
          ${others.map(p => `
            <a class="cat-tile" href="#/product/${encodeURIComponent(cat.id)}/${encodeURIComponent(p.id)}" onclick="goTo('#/product/${encodeURIComponent(cat.id)}/${encodeURIComponent(p.id)}');return false;">
              <div class="cat-tile-img">${prodThumb(cat, p, 'tile-img')}</div>
              <div class="cat-tile-name">${escapeHtml(p.name)}</div>
              <div class="cat-tile-desc">${escapeHtml(p.shortDesc)}</div>

function setPrimaryPhoto(idx) {
  const prod = findProduct(state.route.catId, state.route.prodId);
  if (!prod || !prod.photos) return;
  const ph = prod.photos.splice(idx, 1)[0];
  prod.photos.unshift(ph);
  render();
}

/* ---------- Root render ---------- */
function render() {
  const app = document.getElementById('app');
  const d = state.data;
  let body = '';

  if (state.route.name === 'category') {
    const cat = findCategory(state.route.catId);
    body = cat ? renderCategoryPage(cat) : `<div class="wrap"><div class="empty-state">Category not found. <a href="#/" onclick="goTo('#/');return false;">Go back home</a></div></div>`;
  } else if (state.route.name === 'product') {
    const cat = findCategory(state.route.catId);
    const prod = cat ? findProduct(state.route.catId, state.route.prodId) : null;
    body = (cat && prod) ? renderProductPage(cat, prod) : `<div class="wrap"><div class="empty-state">Product not found. <a href="#/" onclick="goTo('#/');return false;">Go back home</a></div></div>`;
  } else {
    body = renderHome();
  }

  app.innerHTML = renderHeader() + body + renderFooter();

  const input = document.getElementById('searchInput');
  if (input) {
    input.addEventListener('input', (e) => { state.query = e.target.value; render(); });
    input.focus();
    input.selectionStart = input.selectionEnd = input.value.length;
  }
}

async function init() {
  parseHash();
  await tryInitFirebase();
  await loadData();
  render();
  if (firebaseAvailable && needsResave) {
    saveData().catch(() => {});
  }
  if (firebaseAvailable) {
    try {
      fbRefs.onSnapshot(fbRefs.catalogDocRef, (snap) => {
        if (snap.exists() && snap.data() && snap.data().json) {
          const incoming = snap.data().json;
          if (incoming !== JSON.stringify(state.data)) {
            state.data = JSON.parse(incoming);
            render();
          }
        }
      }, (err) => console.error('Live sync error', err));
    } catch (e) {
      console.error('Could not attach live sync listener', e);
    }
  }
}

function showFatalError(err) {
  console.error('Catalogue failed to start', err);
  const app = document.getElementById('app');
  if (app) {
    app.innerHTML = `<div style="max-width:520px;margin:80px auto;padding:24px;font-family:sans-serif;text-align:center;color:#444;">
      <h2 style="margin:0 0 10px;">Something went wrong loading the catalogue</h2>
      <p style="font-size:14px;line-height:1.6;">Please try refreshing the page. If this keeps happening, check that you have an internet connection — this page needs one to load its content.</p>
    </div>`;
  }
}

window.addEventListener('error', (e) => { if (!document.getElementById('app').innerHTML) showFatalError(e.error || e.message); });
init().catch(showFatalError);

window.addApartItem = addApartItem;
