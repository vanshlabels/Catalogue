<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vansh Labels — Product Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#16224a;
  --red:#c81e2c;
  --bg:#faf9f6;
  --card-bg:#ffffff;
  --header-bg:rgba(250,249,246,0.92);
  --ink:#20232b;
  --muted:#6b7078;
  --line:#e7e5df;
  --row-hover:#faf8f3;
  --font-head:'Fraunces',serif;
  --font-body:'Inter',sans-serif;
  --head-weight:600;
  --head-tracking:normal;
  --accent-style:italic;
  --card-radius:14px;
  --btn-radius:100px;
  --card-shadow:0 2px 10px rgba(22,34,74,.05);
  --card-shadow-hover:0 16px 32px rgba(22,34,74,.12);
  --logo-h:34px;
  --hero-pad-y:64px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
h1,h2{font-family:var(--font-head);color:var(--navy);margin:0;}
img{max-width:100%;display:block;}

/* Watermark */
.cat-tile-img,.cat-head-img,.prod-row-img,.prod-primary{position:relative;}
.wm-badge{position:absolute;bottom:6px;right:6px;width:22%;max-width:38px;min-width:16px;height:auto;opacity:.8;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));pointer-events:none;}
.wm-badge-lg{width:15%;max-width:60px;min-width:26px;bottom:12px;right:12px;}
.wm-badge-hero{position:absolute;bottom:16px;right:20px;width:44px;height:auto;opacity:.85;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5));z-index:1;pointer-events:none;}

/* Buttons */
.btn{border:none;cursor:pointer;font-size:12.5px;font-weight:600;padding:9px 18px;border-radius:var(--btn-radius);transition:opacity .15s, transform .1s;font-family:var(--font-body);}
.btn:active{transform:scale(.97);}
.btn-outline{background:transparent;border:1px solid var(--navy);color:var(--navy);}
.btn-outline:hover{background:var(--navy);color:#fff;}
.btn-solid{background:var(--red);color:#fff;}
.btn-solid:hover{opacity:.88;}
.link-btn{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0;font-family:var(--font-body);}
.link-btn:hover{color:var(--red);}

/* Header */
header.site{position:sticky;top:0;z-index:40;background:var(--header-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.header-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:16px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:11px;}
.brand-icon{height:var(--logo-h);width:auto;display:block;}
.brand-text{display:flex;flex-direction:column;line-height:1.2;}
.brand-name{font-family:var(--font-head);font-weight:var(--head-weight);font-size:15px;color:var(--navy);letter-spacing:.05em;text-transform:uppercase;}
.brand-tag{font-size:10px;color:var(--muted);font-style:var(--accent-style);letter-spacing:.01em;}
.header-actions{display:flex;align-items:center;gap:10px;}
.search-box{position:relative;}
.search-box input{border:1px solid var(--line);background:#fff;border-radius:100px;padding:9px 16px 9px 34px;font-size:13px;width:200px;outline:none;font-family:var(--font-body);transition:width .2s, border-color .2s;}
.search-box input:focus{width:250px;border-color:var(--navy);}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);}

/* Hero */
.hero{position:relative;overflow:hidden;padding:var(--hero-pad-y) 0 44px;background:var(--card-bg);border-bottom:1px solid var(--line);}
.hero.has-bg{background-size:cover;background-position:center;border-bottom:none;}
.hero.has-bg::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(22,34,74,.60),rgba(22,34,74,.78));z-index:0;}
.hero-inner{position:relative;z-index:1;}
.hero h1{font-size:clamp(27px,6.5vw,48px);line-height:1.16;margin:0 0 14px;font-weight:var(--head-weight);letter-spacing:var(--head-tracking);color:var(--navy);}
.hero h1 em{font-style:var(--accent-style);color:var(--red);}
.hero p.lede{font-size:14.5px;color:var(--muted);max-width:540px;margin:0 0 8px;line-height:1.65;}
.hero.has-bg h1,.hero.has-bg p.lede,.hero.has-bg .stat .num{color:#fff;}
.hero.has-bg h1 em{color:#f0b93d;}
.hero.has-bg .stat .lbl{color:#f0b93d;}
.hero.has-bg .stat{border-left-color:rgba(255,255,255,.3);}
.hero.has-bg .hero-edit-link,.hero.has-bg .hero-add-stat{color:rgba(255,255,255,.7) !important;}
.hero.has-bg .stat-admin button{color:rgba(255,255,255,.6);}
.hero-admin-links{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px;}
.hero-edit-link{color:var(--muted) !important;display:inline-block;}
.hero-edit-link:hover{color:var(--red) !important;}
.hero-stats{display:grid;gap:0;margin-top:18px;max-width:560px;}
.stat{padding:0 20px;border-left:1px solid var(--line);text-align:left;}
.stat:first-child{padding-left:0;border-left:none;}
.stat .num{display:block;font-family:var(--font-head);font-size:clamp(18px,5vw,26px);font-weight:var(--head-weight);color:var(--navy);line-height:1;}
.stat .lbl{display:block;font-size:9.5px;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-top:6px;font-weight:600;}
.stat-admin{display:flex;gap:8px;margin-top:6px;}
.stat-admin button{background:none;border:none;font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0;}
.stat-admin button:hover{color:var(--navy);}
.hero-add-stat{color:var(--muted) !important;margin-top:16px;}
.hero-add-stat:hover{color:var(--red) !important;}
@media(max-width:480px){.hero-stats{max-width:100%;}.stat{padding:0 10px;}.hero{padding:36px 0 34px;}}

/* Product gallery: explicit slot grid so it reads as multi-photo, not single */
.prod-thumbs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px;}
@media(max-width:420px){.prod-thumbs{grid-template-columns:repeat(4,1fr);}}
.prod-thumb-wrap{position:relative;aspect-ratio:1/1;}
.prod-thumb-btn{width:100%;height:100%;border-radius:8px;overflow:hidden;padding:0;border:2px solid transparent;cursor:pointer;background:none;}
.prod-thumb-wrap.is-primary .prod-thumb-btn{border-color:var(--red);}
.prod-thumb-btn img{width:100%;height:100%;object-fit:cover;}
.prod-thumb-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--navy);color:#fff;border:none;font-size:12px;line-height:1;cursor:pointer;}
.prod-thumb-add{aspect-ratio:1/1;border:1.5px dashed var(--line);border-radius:8px;background:none;color:var(--muted);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.prod-thumb-add:hover{border-color:var(--navy);color:var(--navy);}
.gallery-hint{font-size:11.5px;color:var(--muted);margin:10px 0 0;line-height:1.5;}

/* Section head */
.section-head{display:flex;align-items:center;justify-content:space-between;margin:38px 0 18px;gap:12px;}
.section-head h2{font-size:22px;font-weight:var(--head-weight);letter-spacing:var(--head-tracking);}

/* Category grid (home) */
.cat-grid-section{padding:6px 0 10px;}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media(min-width:760px){.cat-grid{grid-template-columns:repeat(3,1fr);gap:22px;}}
.cat-tile{display:flex;flex-direction:column;background:var(--card-bg);border:1px solid var(--line);border-radius:var(--card-radius);overflow:hidden;box-shadow:var(--card-shadow);transition:transform .18s, box-shadow .18s;}
.cat-tile:hover{transform:translateY(-3px);box-shadow:var(--card-shadow-hover);}
.tile-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#eee;}
.icon-tile{display:flex;align-items:center;justify-content:center;}
.cat-tile-name{font-family:var(--font-head);font-weight:var(--head-weight);font-size:15.5px;color:var(--navy);padding:14px 14px 2px;letter-spacing:var(--head-tracking);}
.cat-tile-desc{font-size:12.5px;color:var(--muted);padding:5px 14px 16px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.9em;}
.add-cat-cta{text-align:center;padding:26px 0 10px;}

/* Category page */
.cat-page{padding:32px 0 10px;}
.back-link{display:inline-block;font-size:12.5px;color:var(--muted);margin-bottom:22px;font-weight:600;}
.back-link:hover{color:var(--navy);}
.cat-head{display:flex;gap:28px;align-items:center;flex-wrap:wrap;padding-bottom:8px;}
.head-img{width:220px;height:220px;border-radius:var(--card-radius);object-fit:cover;flex:0 0 220px;background:#eee;}
.cat-head-info{flex:1;min-width:240px;}
.cat-head-info h1{font-size:28px;margin-bottom:10px;font-weight:var(--head-weight);letter-spacing:var(--head-tracking);}
.cat-head-info p{font-size:14.5px;color:var(--muted);line-height:1.7;max-width:600px;margin:0;}

/* Product list rows */
.prod-list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--line);}
.prod-row{display:flex;align-items:center;gap:16px;padding:14px 4px;border-bottom:1px solid var(--line);transition:background .15s;}
.prod-row:hover{background:var(--row-hover);}
.row-img{width:88px;height:88px;border-radius:var(--card-radius);object-fit:cover;flex:0 0 88px;background:#eee;}
.prod-row-info{min-width:0;}
.prod-row-name{font-family:var(--font-head);font-weight:var(--head-weight);font-size:15px;color:var(--navy);}
.prod-row-desc{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
@media(max-width:400px){.row-img{width:72px;height:72px;flex:0 0 72px;}}

/* Product page */
.prod-page{padding:32px 0 10px;}
.prod-main{display:flex;gap:40px;flex-wrap:wrap;padding-bottom:20px;}
.prod-gallery{flex:1 1 360px;min-width:280px;}
.prod-primary{width:100%;aspect-ratio:1/1;border-radius:var(--card-radius);overflow:hidden;background:#eee;}
.prod-primary img{width:100%;height:100%;object-fit:cover;}
.prod-info{flex:1 1 320px;min-width:280px;}
.prod-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:8px;}
.prod-info h1{font-size:28px;margin-bottom:14px;font-weight:var(--head-weight);}
.prod-info p{font-size:14.5px;color:var(--muted);line-height:1.75;margin:0 0 16px;max-width:520px;}

.related-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media(min-width:760px){.related-grid{grid-template-columns:repeat(4,1fr);}}

/* Admin controls */
.admin-row{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
.admin-row button{background:none;border:none;font-size:11.5px;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0;font-family:var(--font-body);}
.admin-row button:hover{color:var(--navy);}
.admin-row button.danger,.admin-row .danger{color:#b23a3a;}
.admin-bar{position:fixed;bottom:0;left:0;right:0;background:var(--navy);color:#fff;padding:12px 20px;display:flex;justify-content:center;gap:14px;align-items:center;z-index:60;font-size:12.5px;text-align:center;}

/* What Sets Us Apart */
.apart-section{padding-top:10px;}
.apart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media(min-width:760px){.apart-grid{grid-template-columns:repeat(3,1fr);}}
.apart-card{background:var(--card-bg);border:1px solid var(--line);border-radius:var(--card-radius);padding:18px;}
.apart-mark img{width:22px;height:22px;object-fit:contain;margin-bottom:10px;}
.apart-title{font-family:var(--font-head);font-weight:var(--head-weight);font-size:14.5px;color:var(--navy);margin-bottom:4px;}
.apart-desc{font-size:12.5px;color:var(--muted);line-height:1.55;}

/* FAQ */
.faq-section{padding-bottom:20px;}
.faq-list{border-top:1px solid var(--line);}
.faq-item{border-bottom:1px solid var(--line);padding:14px 2px;}
.faq-item summary{cursor:pointer;font-family:var(--font-head);font-weight:var(--head-weight);font-size:14.5px;color:var(--navy);list-style:none;}
.faq-item summary::-webkit-details-marker{display:none;}
.faq-item summary::before{content:'+ ';color:var(--red);font-weight:700;}
.faq-item[open] summary::before{content:'– ';}
.faq-item p{font-size:13.5px;color:var(--muted);line-height:1.65;margin:10px 0 0;max-width:640px;}

/* Footer */
footer{padding:40px 0 90px;margin-top:20px;}
.foot-row{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:24px;}
.foot-brand{font-family:var(--font-head);font-size:13px;letter-spacing:.08em;color:var(--navy);font-weight:700;text-transform:uppercase;}
.foot-contact{display:flex;gap:20px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);}
.foot-note{font-size:11.5px;color:#9a9da3;margin-top:16px;}

.empty-state{padding:60px 20px;text-align:center;color:var(--muted);grid-column:1/-1;}

@media(max-width:640px){
  .cat-head{flex-direction:column;align-items:flex-start;}
  .head-img{width:100%;flex-basis:auto;aspect-ratio:1/1;height:auto;}
  .search-box input{width:130px;}
  .search-box input:focus{width:160px;}
  .wrap{padding:0 16px;}
}
@media(max-width:360px){
  .search-box input{width:96px;padding-left:30px;font-size:12px;}
  .brand-name{font-size:13px;}
  .brand-tag{display:none;}
}

.faq-item summary{font-size:15px;}
.apart-card{transition:transform .15s;}
.apart-card:hover{transform:translateY(-2px);}
</style>

ce while enhancing products with premium visual appeal throughout.", "fullDesc": "UV Stickers are manufactured using advanced UV printing technology to produce rich colours, crisp details, and exceptional durability. Their resistance to fading, scratches, moisture, and regular handling makes them ideal for electronics, bottles, premium packaging, gifting, home d\u00e9cor, branding, and promotional products. Every UV sticker is fully customisable in size, shape, finishes, adhesives, and artwork, providing businesses with a premium-quality branding solution.", "photos": []}, {"id": "stickers__metallic-stickers", "name": "Metallic Stickers", "shortDesc": "Reflective finishes that give products a bold, premium identity with striking visual appeal and lasting impressions.", "fullDesc": "Metallic Stickers add elegance and sophistication with reflective finishes available in gold, silver, chrome, brushed metal, and customised metallic shades. Ideal for luxury goods, electronics, cosmetics, machinery, gifting, and retail packaging, they instantly enhance your product presentation. At Vansh Labels, every metallic sticker is fully customisable with different sizes, shapes, finishes, adhesives, embossing options, and printing styles, helping your products achieve a premium look that customers remember.", "photos": []}]}, {"id": "cards", "name": "Cards", "color": "#d63384", "img": "", "shortDesc": "Thoughtfully designed cards that help you build stronger connections before, during, and after every customer interaction.", "mediumDesc": "Sometimes, the smallest card leaves the biggest impression. Whether you're introducing your business or thanking your customers, well-designed cards help create meaningful connections that extend beyond a single interaction. At Vansh Labels, we offer fully customisable card solutions that reflect your brand's personality, ensuring every meeting, purchase, and delivery leaves a memorable and professional impression.", "products": [{"id": "cards__t  doesn't end at the checkout\u2014it continues with the bag your customer carries home. Carry Bags protect your products while extending your brand's visibility beyond the store. At Vansh Labels, we offer fully customisable carry bags in multiple materials, sizes, and finishes, helping businesses create packaging that's practical, attractive, and memorable for every customer.", "products": [{"id": "carry-bags__plastic-carry-bags", "name": "Plastic Carry Bags", "shortDesc": "Lightweight, durable bags that keep products secure while promoting your brand with every purchase made.", "fullDesc": "Plastic Carry Bags are a practical packaging solution designed for strength, convenience, and everyday retail use. Ideal for garment stores, supermarkets, pharmacies, gift shops, exhibitions, and retail businesses, they offer excellent durability while remaining lightweight and easy to carry. At Vansh Labels, every plastic carry bag is fully customisable with your preferred size, thickness, colours, handle styles, and printing options. Whether you choose a simple logo or vibrant full-colour branding, these bags combine functionality with excellent brand visibility, ensuring your products leave the store looking as good as they did on display.", "photos": []}, {"id": "carry-bags__paper-carry-bags", "name": "Paper Carry Bags", "shortDesc": "Premium paper bags that elevate product presentation and make every purchase feel extra special and memorable.", "fullDesc": "Paper Carry Bags combine elegance with practicality, making them a favourite among boutiques, fashion brands, jewellery stores, bakeries, caf\u00e9s, gift shops, cosmetics brands, and premium retailers. Their refined appearance instantly enhances the shopping experience while beautifully showcasing your brand. At Vansh Labels, every paper carry bag is fully customisable with different sizes, paper thicknesses, handle options, colours, printing styles, and premium finishes. Whether you're packaging apparel, gifts, or luxury products, these bags create an impressive presentation that customers are proud to carry.", "photos": []}, {"id": "carry-bags__jute-carry-bags", "name": "Jute Carry Bags", "shortDesc": "Strong, stylish bags designed for repeated use while giving your brand a timeless, premium presence everywhere.", "fullDesc": "Jute Carry Bags combine durability with a naturally premium appearance, making them an excellent choice for businesses looking to offer reusable packaging. Popular among boutiques, lifestyle brands, exhibitions, corporate gifting companies, organic stores, and speciality retailers, these bags continue promoting your business long after the original purchase. At Vansh Labels, every jute carry bag is fully customisable with different sizes, colours, handle options, printing styles, and branding elements. Strong, practical, and visually appealing, they deliver everyday functionality while reinforcing your brand identity.", "photos": []}, {"id": "carry-bags__tote-bags", "name": "Tote Bags", "shortDesc": "Versatile everyday bags that turn practical utility into continuous brand visibility wherever customers travel or shop.", "fullDesc": "Tote Bags have become one of the most popular promotional and retail packaging solutions thanks to their practicality and reusability. Ideal for fashion brands, bookstores, exhibitions, colleges, corporate gifting, promotional campaigns, and lifestyle businesses, they offer generous space while remaining comfortable to carry. At Vansh Labels, every tote bag is fully customisable with different sizes, colours, artwork, handle styles, and printing options to suit your branding requirements. Designed for repeated use, tote bags help your business remain visible long after customers have made their purchase.", "photos": []}, {"id": "carry-bags__non-woven-carry-bags", "name": "Non-Woven Carry Bags", "shortDesc": "Reliable reusable bags that combine durability, convenience, and everyday branding in one practical packaging solution.", "fullDesc": "Non-Woven Carry Bags are designed for businesses seeking durable, lightweight, and cost-effective packaging. Their sturdy construction makes them suitable for retail stores, supermarkets, exhibitions, educational institutions, healthcare businesses, clothing brands, and promotional events. Built for repeated use, these bags continue promoting your business while providing customers with a dependable packaging solution. At Vansh Labels, every non-woven carry bag is fully customisable with your preferred size, fabric thickness, colours, handle styles, and printing options, creating practical packaging that strengthens your brand.", "photos": []}, {"id": "carry-bags__metallic-carry-bags", "name": "Metallic Carry Bags", "shortDesc": "Luxurious metallic finishes that instantly transform packaging into a premium extension of your brand identity.", "fullDesc": "Metallic Carry Bags are designed for brands that believe packaging should be as impressive as the product inside. Their reflective metallic finish adds sophistication and visual appeal, making them ideal for jewellery stores, cosmetics brands, premium gifting, festive packaging, exhibitions, luxury boutiques, and high-end retail. At Vansh Labels, every metallic carry bag is fully customisable with different sizes, colours, metallic finishes, handle styles, printing, and branding options. These bags don't just carry products\u2014they elevate the entire customer experience while creating a premium and memorable brand impression.", "photos": []}]}], "whatSetsApart": [{"title": "Time-to-Time Delivery", "desc": "Reliable turnaround you can plan your production around."}, {"title": "Top-Quality Raw Material", "desc": "Sourced and tested for consistency, run after run."}, {"title": "Customization Option", "desc": "Sizes, finishes and materials tailored to your brand."}, {"title": "Price Worth the Product", "desc": "Fair, transparent pricing for premium-grade output."}, {"title": "Great After-Sale Service", " /* ---------- Image compression (keeps quality high, keeps file sizes safely small) ---------- */
function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height) {
          if (width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
        } else if (height > maxDim) {
          width = Math.round(width * (maxDim / height)); height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('Could not read image'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

function recompressDataUrl(dataUrl, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > height) {
        if (width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
      } else if (height > maxDim) {
        width = Math.round(width * (maxDim / height)); height = maxDim;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => reject(new Error('Could not read image'));
    img.src = dataUrl;
  });
}

function estimateBytes(dataUrl) {
  if (!dataUrl) return 0;
  const commaIdx = dataUrl.indexOf(',');
  const b64 = commaIdx >= 0 ? dataUrl.slice(commaIdx + 1) : dataUrl;
  return Math.ceil(b64.length * 0.75);
}

async function ensureUnderBytes(dataUrl, maxBytes) {
  if (!dataUrl || estimateBytes(dataUrl) <= maxBytes) return dataUrl;
  let maxDim = 1200;
  let quality = 0.8;
  let result = dataUrl;
  for (let attempt = 0; attempt < 7; attempt++) {
    try {
      result = await recompressDataUrl(dataUrl, maxDim, quality);
    } catch (e) {
      return dataUrl; // give up shrinking, return original rather than throw
    }
    if (estimateBytes(result) <= maxBytes) return result;
    maxDim = Math.round(maxDim * 0.75);
    quality = Math.max(0.35, quality - 0.12);
  }
  return result;
}

  const def = cloneDefault();
  if (!loaded || typeof loaded !== 'object') return def;
  const out = {};
  if (Array.isArray(loaded.categories) && loaded.categories.length) {
    out.categories = loaded.categories.map(c => ({
      id: c.id || uid('cat'), name: c.name || 'Category', color: c.color || '#334', img: c.img || '',
      shortDesc: c.shortDesc || c.desc || '', mediumDesc: c.mediumDesc || c.desc || '',
      products: Array.isArray(c.products) ? c.products.map(p => ({
        id: p.id || uid('prod'), name: p.name || 'Product',
        shortDesc: p.shortDesc || p.desc || '', fullDesc: p.fullDesc || p.desc || '',
        photos: Array.isArray(p.photos) ? p.photos : []
      })) : []
    }));
  } else {
    out.categories = def.categories;
  }
  if (Array.isArray(loaded.whatSetsApart) && loaded.whatSetsApart.length) {
    out.whatSetsApart = loaded.whatSetsApart;
  } else if (Array.isArray(loaded.whyChoose) && loaded.whyChoose.length) {
    out.whatSetsApart = loaded.whyChoose.map(w => ({ title: String(w), desc: '' }));
  } else {
    out.whatSetsApart = def.whatSetsApart;
  }
  out.faqs = Array.isArray(loaded.faqs) && loaded.faqs.length ? loaded.faqs : def.faqs;
  out.contact = (loaded.contact && loaded.contact.phone) ? loaded.contact : def.contact;
  out.heroTitleMain = loaded.heroTitleMain || def.heroTitleMain;
  out.heroTitleAccent = loaded.heroTitleAccent || def.heroTitleAccent;
  out.heroLede = loaded.heroLede || def.heroLede;
  out.heroBgImage = loaded.heroBgImage || '';
  out.heroStats = (Array.isArray(loaded.heroStats) && loaded.heroStats.length) ? loaded.heroStats : def.heroStats;
  return out;
}

/* ---------- Firestore v4: the same reliable text document (unchanged), photos isolated in their own tiny docs ---------- */
async function loadData() {
  state.data = cloneDefault();
  if (!firebaseAvailable) return;
  try {
    const mainSnap = await fbRefs.getDoc(fbRefs.mainRef);
    if (mainSnap.exists() && mainSnap.data() && mainSnap.data().json) {
      state.data = migrateData(JSON.parse(mainSnap.data().json));
    }
  } catch (e) {
    console.error('Could not load catalogue text from Firebase, using defaults', e);
  }
  // Photos are optional overlays — if this fails, your categories/products/descriptions still show correctly.
  try {
    const catPhotosSnap = await fbRefs.getDocs(fbRefs.catPhotosCol);
    const catPhotoMap = {};
    catPhotosSnap.forEach(d => { catPhotoMap[d.id] = d.data().img || ''; });
    const prodPhotosSnap = await fbRefs.getDocs(fbRefs.prodPhotosCol);
    const prodPhotoMap = {};
    prodPhotosSnap.forEach(d => { prodPhotoMap[d.id] = d.data().photos || []; });
    for (const cat of state.data.categories) {
      if (catPhotoMap[cat.id]) cat.img = catPhotoMap[cat.id];
      for (const p of cat.products) {
        if (prodPhotoMap[p.id]) p.photos = prodPhotoMap[p.id];
      }
    }
    const heroPhotoSnap = await fbRefs.getDoc(fbRefs.heroPhotoRef);
    if (heroPhotoSnap.exists() && heroPhotoSnap.data()) {
      state.data.heroBgImage = heroPhotoSnap.data().img || '';
    }
  } catch (e) {
    console.error('Could not load photos (text content is still shown correctly)', e);
  }
}

async function saveMainDoc() {
  if (!firebaseAvailable) { alert(OFFLINE_MSG); return; }
  try {
    const d = state.data;
    const stripped = {
      ...d,
      heroBgImage: '',
      categories: d.categories.map(c => ({
        ...c, img: '', products: c.products.map(p => ({ ...p, photos: [] }))
      }))
    };
    await fbRefs.setDoc(fbRefs.mainRef, { json: JSON.stringify(stripped), updatedAt: Date.now() });
  } catch (e) {
    console.error(e);
    alert(SAVE_FAIL_MSG);
  }
}

async function saveProductPhotos(catId, prodId) {

/* ---------- Routing ---------- */
function parseHash() {
  const h = location.hash.replace(/^#\/?/, '');
  const parts = h.split('/').filter(Boolean);
  if (parts[0] === 'category' && parts[1]) {
    state.route = { name: 'category', catId: decodeURIComponent(parts[1]) };
  } else if (parts[0] === 'product' && parts[1] && parts[2]) {
    state.route = { name: 'product', catId: decodeURIComponent(parts[1]), prodId: decodeURIComponent(parts[2]) };
  } else {
    state.route = { name: 'home' };
  }
}
function goTo(hash) {
  window.scrollTo(0, 0);
  location.hash = hash;
}
window.addEventListener('hashchange', () => {
  parseHash();
  render();
  window.scrollTo(0, 0);
});

/* ---------- Helpers ---------- */
function findCategory(catId) {
  return state.data.categories.find(c => c.id === catId);
}
function findProduct(catId, prodId) {
  const cat = findCategory(catId);
  if (!cat) return null;
  return cat.products.find(p => p.id === prodId) || null;
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}
function matchesQuery(cat, q) {
  if (!q) return true;
  q = q.toLowerCase();
  if (cat.name.toLowerCase().includes(q)) return true;
  if (cat.shortDesc.toLowerCase().includes(q)) return true;
  return cat.products.some(p => p.name.toLowerCase().includes(q) || p.shortDesc.toLowerCase().includes(q));
}
function catThumb(cat, sizeClass) {
  if (cat.img) return `<img class="${sizeClass}" src="${cat.img}" alt="${escapeHtml(cat.name)}"><img class="wm-badge" src="${ICON_SRC}" alt="">`;
  return `<div class="${sizeClass} icon-tile" style="background:${cat.color || '#334'};">${tagIconSVG()}</div>`;
}
function prodThumb(cat, prod, sizeClass) {
  const src = (prod.photos && prod.photos[0]) ? prod.photos[0] : cat.img;
  if (src) return `<img class="${sizeClass}" src="${src}" alt="${escapeHtml(prod.name)}"><img class="wm-badge" src="${ICON_SRC}" alt="">`;
  return `<div class="${sizeClass} icon-tile" style="background:${cat.color || '#334'};">${tagIconSVG()}</div>`;
}

/* ---------- Admin: auth ---------- */
function enterAdmin() {
  const code = prompt('Enter the catalogue edit code to make changes:');
  if (code === null) return;
  if (code.trim() === EDIT_CODE) {
    state.isAdmin = true;
    render();
  } else {
    alert('That code is not correct.');
  }
}
function exitAdmin() {
  state.isAdmin = false;
  render();
}
async function resetCatalog() {
  if (!confirm('Reset the entire catalogue back to the original Vansh Labels content? This cannot be undone.')) return;
  if (firebaseAvailable) {
    try {
      const catPhotosSnap = await fbRefs.getDocs(fbRefs.catPhotosCol);
      for (const d of catPhotosSnap.docs) await fbRefs.deleteDoc(d.ref);
      const prodPhotosSnap = await fbRefs.getDocs(fbRefs.prodPhotosCol);
      for (const d of prodPhotosSnap.docs) await fbRefs.deleteDoc(d.ref);
      await fbRefs.deleteDoc(fbRefs.heroPhotoRef);
    } catch (e) { console.error(e); }
  }
  state.data = cloneDefault();
  render();
  if (firebaseAvailable) {
    try { await saveMainDoc(); } catch (e) { console.error(e); alert(SAVE_FAIL_MSG); }
  }
  goTo('#/');
}

function addProductPhotos(catId, prodId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  input.onchange = async () => {
    const files = Array.from(input.files || []);
    if (!files.length) return;
    try {
      const results = await Promise.all(files.map(f => compressImage(f, 1000, 0.76)));
      const prod = findProduct(catId, prodId);
      prod.photos = (prod.photos || []).concat(results);
      render();
      await saveProductPhotos(catId, prodId);
    } catch (e) {
      console.error(e);
      alert(PHOTO_FAIL_MSG);
    }
  };
  input.click();

          ${cats.length === 0 ? `<div class="empty-state">No categories match your search.</div>` : ''}
        </div>
        ${state.isAdmin ? `<div class="add-cat-cta"><button class="btn btn-outline" onclick="addCategory()">+ Add new category</button></div>` : ''}
      </div>
    </section>
    <div class="wrap">${renderApartFAQSection()}</div>
  `;
}

/* ---------- Page: Category ---------- */
function renderCategoryPage(cat) {
  return `
    <section class="cat-page">
      <div class="wrap">
        <a class="back-link" href="#/" onclick="goTo('#/');return false;">&larr; All categories</a>
        <div class="cat-head">
          <div class="cat-head-img">${catThumb(cat, 'head-img')}</div>
          <div class="cat-head-info">
            <h1>${escapeHtml(cat.name)}</h1>
            <p>${escapeHtml(cat.mediumDesc)}</p>
            ${state.isAdmin ? `<div class="admin-row">
              <button onclick="editCategoryImage('${cat.id}')">${cat.img ? 'Change photo' : 'Add photo'}</button>
              <button onclick="editCategoryText('${cat.id}')">Edit text</button>
              <button onclick="deleteCategory('${cat.id}')" class="danger">Delete category</button>
            </div>` : ''}
          </div>
        </div>
        <div class="section-head"><h2>Products in ${escapeHtml(cat.name)}</h2></div>
        <div class="prod-list">
          ${cat.products.map(p => `
            <a class="prod-row" href="#/product/${encodeURIComponent(cat.id)}/${encodeURIComponent(p.id)}" onclick="goTo('#/product/${encodeURIComponent(cat.id)}/${encodeURIComponent(p.id)}');return false;">
              <div class="prod-row-img">${prodThumb(cat, p, 'row-img')}</div>
              <div class="prod-row-info">
                <div class="prod-row-name">${escapeHtml(p.name)}</div>
                <div class="prod-row-desc">${escapeHtml(p.shortDesc)}</div>
              </div>
            </a>
          `).join('') || `<div class="empty-state">No products in this category yet.</div>`}
        </div>
        ${state.isAdmin ? `<div class="add-cat-cta"><button class="btn btn-outline" onclick="addProduct('${cat.id}')">+ Add product</button></div>` : ''}
      </div>
    </section>
    <div class="wrap">${renderApartFAQSection()}</div>
  `;
}

/* ---------- Page: Product ---------- */
function renderProductPage(cat, prod) {
  const photos = prod.photos && prod.photos.length ? prod.photos : [];
  const others = cat.products.filter(p => p.id !== prod.id);
  return `
    <section class="prod-page">
      <div class="wrap">
        <a class="back-link" href="#/category/${encodeURIComponent(cat.id)}" onclick="goTo('#/category/${encodeURIComponent(cat.id)}');return false;">&larr; Back to ${escapeHtml(cat.name)}</a>
        <div class="prod-main">
          <div class="prod-gallery">
            <div class="prod-primary">${photos.length ? `<img src="${photos[0]}" alt="${escapeHtml(prod.name)}"><img class="wm-badge wm-badge-lg" src="${ICON_SRC}" alt="">` : `<div class="icon-tile" style="background:${cat.color || '#334'};width:100%;height:100%;">${tagIconSVG()}</div>`}</div>
            <div class="prod-thumbs">
              ${photos.map((ph, i) => `
                <div class="prod-thumb-wrap ${i === 0 ? 'is-primary' : ''}">
                  <button class="prod-thumb-btn" onclick="setPrimaryPhoto(${i})"><img src="${ph}" alt=""></button>
                  ${state.isAdmin ? `<button class="prod-thumb-remove" title="Remove photo" onclick="removeProductPhoto('${cat.id}','${prod.id}',${i})">&times;</button>` : ''}
                </div>
              `).join('')}
              ${state.isAdmin ? Array.from({ length: Math.max(0, 6 - photos.length) }).map(() => `<button class="prod-thumb-add" onclick="addProductPhotos('${cat.id}','${prod.id}')" title="Add photos">+</button>`).join('') : ''}
            </div>
            ${state.isAdmin ? `<p class="gallery-hint">Add up to 6–7 photos for the best presentation — tap any thumbnail to make it the main photo.</p>` : ''}
          </div>
          <div class="prod-info">
            <div class="prod-eyebrow">${escapeHtml(cat.name)}</div>
            <h1>${escapeHtml(prod.name)}</h1>
            <p>${escapeHtml(prod.fullDesc)}</p>
            ${state.isAdmin ? `<div class="admin-row">
              <button onclick="editProductText('${cat.id}','${prod.id}')">Edit text</button>
              <button onclick="deleteProduct('${cat.id}','${prod.id}')" class="danger">Delete product</button>
            </div>` : ''}
          </div>
        </div>

        ${others.length ? `
        <div class="section-head"><h2>More from ${escapeHtml(cat.name)}</h2></div>
        <div class="related-grid">
          ${others.map(p => `
            <a class="cat-tile" href="#/product/${encodeURIComponent(cat.id)}/${encodeURIComponent(p.id)}" onclick="goTo('#/product/${encodeURIComponent(cat.id)}/${encodeURIComponent(p.id)}');return false;">
              <div class="cat-tile-img">${prodThumb(cat, p, 'tile-img')}</div>
              <div class="cat-tile-name">${escapeHtml(p.name)}</div>
              <div class="cat-tile-desc">${escapeHtml(p.shortDesc)}</div>
            </a>
          `).join('')}
        </div>` : ''}
      </div>
    </section>
    <div class="wrap">${renderApartFAQSection()}</div>
  `;
}

/* ---------- Root render ---------- */
function render() {
  const app = document.getElementById('app');
  const d = state.data;
  let body = '';

  if (state.route.name === 'category') {
    const cat = findCategory(state.route.catId);
    body = cat ? renderCategoryPage(cat) : `<div class="wrap"><div class="empty-state">Category not found. <a href="#/" onclick="goTo('#/');return false;">Go back home</a></div></div>`;
  } else if (state.route.name === 'product') {
    const cat = findCategory(state.route.catId);
    const prod = cat ? findProduct(state.route.catId, state.route.prodId) : null;
    body = (cat && prod) ? renderProductPage(cat, prod) : `<div class="wrap"><div class="empty-state">Product not found. <a href="#/" onclick="goTo('#/');return false;">Go back home</a></div></div>`;
  } else {
    body = renderHome();
  }

  app.innerHTML = renderHeader() + body + renderFooter();

  const input = document.getElementById('searchInput');
  if (input) {
    input.addEventListener('input', (e) => { state.query = e.target.value; render(); });
    input.focus();
    input.selectionStart = input.selectionEnd = input.value.length;
  }
}

function attachLiveSync() {
  if (!firebaseAvailable) return;
  try {
    fbRefs.onSnapshot(fbRefs.mainRef, (snap) => {
      if (snap.exists() && snap.data() && snap.data().json) {
        const incoming = migrateData(JSON.parse(snap.data().json));
        // Keep whatever photos are already loaded locally; only the text changed.
        const catPhotoMap = {}, prodPhotoMap = {};
        for (const c of state.data.categories) {
          catPhotoMap[c.id] = c.img;
          for (const p of c.products) prodPhotoMap[p.id] = p.photos;
        }
        for (const c of incoming.categories) {
          if (catPhotoMap[c.id]) c.img = catPhotoMap[c.id];
          for (const p of c.products) if (prodPhotoMap[p.id]) p.photos = prodPhotoMap[p.id];
        }
        incoming.heroBgImage = state.data.heroBgImage;
        state.data = incoming;
        render();
      }
    }, (err) => console.error('Live sync (text) error', err));

    fbRefs.onSnapshot(fbRefs.catPhotosCol, (snap) => {
      snap.docChanges().forEach(change => {
        const cat = findCategory(change.doc.id);
        if (cat) cat.img = change.type === 'removed' ? '' : (change.doc.data().img || '');
      });
      render();
    }, (err) => console.error('Live sync (category photos) error', err));

    fbRefs.onSnapshot(fbRefs.prodPhotosCol, (snap) => {
      snap.docChanges().forEach(change => {
        for (const c of state.data.categories) {
          const p = c.products.find(pp => pp.id === change.doc.id);
          if (p) p.photos = change.type === 'removed' ? [] : (change.doc.data().photos || []);
        }
      });
      render();
    }, (err) => console.error('Live sync (product photos) error', err));

    fbRefs.onSnapshot(fbRefs.heroPhotoRef, (snap) => {
      state.data.heroBgImage = (snap.exists() && snap.data()) ? (snap.data().img || '') : '';
      render();
    }, (err) => console.error('Live sync (hero photo) error', err));
  } catch (e) {
    console.error('Could not attach live sync listeners', e);
  }
}

async function init() {
  parseHash();
  await tryInitFirebase();
  await loadData();
  render();
  attachLiveSync();
}

function showFatalError(err) {
  console.error('Catalogue failed to start', err);
  const app = document.getElementById('app');
  if (app) {
    app.innerHTML = `<div style="max-width:520px;margin:80px auto;padding:24px;font-family:sans-serif;text-align:center;color:#444;">
      <h2 style="margin:0 0 10px;">Something went wrong loading the catalogue</h2>
      <p style="font-size:14px;line-height:1.6;">Please try refreshing the page. If this keeps happening, check that you have an internet connection — this page needs one to load its content.</p>
    </div>`;
  }
}

window.addEventListener('error', (e) => { if (!document.getElementById('app').innerHTML) showFatalError(e.error || e.message); });
init().catch(showFatalError);
