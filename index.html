<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vansh Labels — Product Catalogue</title>
<style>
  :root{
    --navy:#0f1730;
    --navy-2:#182449;
    --red:#e0263a;
    --gold:#e8b04b;
    --bg:#f5f6f8;
    --card:#ffffff;
    --line:#e6e8ee;
    --ink:#151823;
    --muted:#666c7d;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);}
  a{color:inherit;}

  .topbar{background:var(--navy);color:#fff;}
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px;}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;flex-wrap:wrap;gap:14px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand img{height:46px;background:#fff;border-radius:8px;padding:6px 10px;}
  .topbar-actions{display:flex;gap:10px;align-items:center;}
  .btn{border:none;cursor:pointer;font-size:12.5px;font-weight:700;border-radius:8px;padding:10px 18px;transition:opacity .15s,transform .1s;}
  .btn:active{transform:scale(.97);}
  .btn-red{background:var(--red);color:#fff;}
  .btn-red:hover{opacity:.9;}
  .btn-line{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;}
  .btn-line:hover{background:rgba(255,255,255,.1);}
  .btn-navy{background:var(--navy);color:#fff;}

  .hero{background:linear-gradient(160deg,var(--navy) 0%,var(--navy-2) 65%,#22305e 100%);color:#fff;padding:54px 0 46px;}
  .hero h1{font-size:clamp(30px,4vw,46px);font-weight:800;line-height:1.1;margin:0 0 14px;max-width:640px;}
  .hero h1 span{color:var(--gold);}
  .hero p{font-size:15.5px;color:#c3c8e0;max-width:520px;line-height:1.65;margin:0 0 26px;}
  .search-row{display:flex;gap:10px;max-width:520px;flex-wrap:wrap;}
  .search-row input{
    flex:1;min-width:220px;padding:13px 18px;border-radius:10px;border:none;font-size:14px;outline:none;
  }
  .why-strip{display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:30px;}
  .why-strip span{font-size:12.5px;color:#dfe2f0;display:flex;align-items:center;gap:8px;}
  .why-strip span::before{content:'✓';color:var(--gold);font-weight:700;}

  .filter-bar{
    position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);
    padding:14px 0;
  }
  .chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;padding:8px 16px;border-radius:100px;font-size:12.5px;font-weight:700;
    background:var(--bg);color:var(--muted);cursor:pointer;border:1px solid var(--line);white-space:nowrap;
  }
  .chip:hover{border-color:var(--navy);}
  .chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}

  main{padding:36px 0 70px;}
  .section-title{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:30px 0 16px;display:flex;align-items:center;gap:10px;}
  .section-title .line{flex:1;height:1px;background:var(--line);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
  .card{
    background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--line);
    transition:transform .18s, box-shadow .18s;display:flex;flex-direction:column;
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 16px 32px rgba(15,23,48,.12);}
  .card .thumb{aspect-ratio:4/3;overflow:hidden;position:relative;background:#eef0f5;}
  .card .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .card .thumb .badge{
    position:absolute;top:10px;left:10px;background:rgba(15,23,48,.82);color:#fff;font-size:10.5px;
    padding:4px 10px;border-radius:100px;font-weight:600;
  }
  .card .thumb .imgbtn{position:absolute;bottom:8px;right:8px;}
  .card .body{padding:16px 16px 18px;flex:1;display:flex;flex-direction:column;}
  .card .pname{font-size:15px;font-weight:700;margin:0 0 6px;}
  .card .pdesc{font-size:13px;color:var(--muted);line-height:1.55;margin:0;flex:1;}
  .card .admin-row{display:flex;gap:12px;margin-top:12px;}
  .card .admin-row button{background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;padding:0;}
  .card .admin-row button:hover{color:var(--red);}

  .cat-card-header{
    display:flex;gap:16px;align-items:center;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:18px 20px;margin-top:34px;margin-bottom:16px;
  }
  .cat-card-header img{width:64px;height:64px;border-radius:10px;object-fit:cover;flex:0 0 auto;background:#eef0f5;}
  .cat-icon-tile{width:64px;height:64px;border-radius:10px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .cat-card-header .info h3{margin:0 0 4px;font-size:18px;}
  .cat-card-header .info p{margin:0;font-size:12.5px;color:var(--muted);max-width:600px;line-height:1.5;}
  .cat-card-header .admin-actions{margin-left:auto;display:flex;gap:10px;flex:0 0 auto;}
  .cat-card-header .admin-actions button{font-size:11px;background:none;border:1px solid var(--line);border-radius:6px;padding:6px 10px;cursor:pointer;color:var(--muted);}
  .cat-card-header .admin-actions button:hover{border-color:var(--navy);color:var(--navy);}

  .add-card{
    border:2px dashed var(--line);border-radius:14px;display:flex;align-items:center;justify-content:center;
    color:var(--muted);cursor:pointer;font-weight:700;font-size:13px;min-height:160px;
  }
  .add-card:hover{border-color:var(--red);color:var(--red);}
  .add-cat-cta{text-align:center;padding:20px 0 6px;}

  footer{background:var(--navy);color:#c3c8e0;padding:36px 0;margin-top:40px;}
  .foot-row{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;font-size:13px;}
  .foot-row .brandline{font-weight:700;color:#fff;}
  .foot-note{font-size:11.5px;color:#8891ae;margin-top:14px;}
  .admin-fab-bar{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
    padding:10px 18px;border-radius:100px;display:flex;gap:14px;align-items:center;font-size:12.5px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;
  }
  .empty-state{padding:70px 20px;text-align:center;color:var(--muted);}
</style>
</head>

const IMG = (key) => {
  if (!key) return '';
  if (key.startsWith('data:')) return key;
  return '';
};

function tagIconSVG() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:38%;height:38%;">
    <path d="M20.59 13.41 12 22 2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82Z"/>
    <circle cx="7" cy="7" r="1.4" fill="#fff" stroke="none"/>
  </svg>`;
}
const LOGO_SRC = 'data:image/png;base64,' + BUNDLE.logo;
const EDIT_CODE = 'vansh123';

let state = {
  data: null,
  isAdmin: false,
  activeCategory: 'all',
  query: ''
};

function cloneDefault() {
  return JSON.parse(JSON.stringify(BUNDLE.data));
}

function uid(prefix) {
  return prefix + '_' + Math.random().toString(36).slice(2, 9);
}

async function loadData() {
  try {
    const snap = await getDoc(catalogDocRef);
    if (snap.exists() && snap.data() && snap.data().json) {
      state.data = JSON.parse(snap.data().json);
      return;
    }
  } catch (e) {
    console.error('Could not load catalogue data from Firebase, using defaults', e);
  }
  state.data = cloneDefault();
}

async function saveData() {
  try {
    await setDoc(catalogDocRef, { json: JSON.stringify(state.data), updatedAt: Date.now() });
  } catch (e) {
    console.error('Could not save catalogue changes', e);
    alert('Sorry — your change could not be saved. Please check your internet connection and try again.');
  }
}

function findCategory(catId) {
  return state.data.categories.find(c => c.id === catId);
}

function enterAdmin() {
  const code = prompt('Enter the catalogue edit code to make changes:');
  if (code === null) return;
  if (code.trim() === EDIT_CODE) {
    state.isAdmin = true;
    render();
  } else {
    alert('That code is not correct.');
  }
}

function exitAdmin() {
  state.isAdmin = false;
  render();
}

async function resetCatalog() {
  if (!confirm('Reset the entire catalogue back to the original Vansh Labels content? This cannot be undone.')) return;
  state.data = cloneDefault();
  await saveData();
  render();
}

/* ---------- Category CRUD ---------- */
async function addCategory() {
  const name = prompt('New category name (e.g. "Care Labels"):');
  if (!name || !name.trim()) return;
  const desc = prompt('Short description of this category:', '') || '';
  state.data.categories.push({
    id: uid('cat'),
    name: name.trim(),
    img: '',
    desc: desc.trim(),
    uses: [],
    products: []
  });
  await saveData();
  render();
}

async function editCategoryText(catId) {
  const cat = findCategory(catId);
  if (!cat) return;
  const name = prompt('Category name:', cat.name);
  if (name === null) return;
  const desc = prompt('Category description:', cat.desc);
  if (desc === null) return;
  cat.name = name.trim();
  cat.desc = desc.trim();
  await saveData();
  render();
}

function editCategoryImage(catId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      const cat = findCategory(catId);
      cat.img = reader.result;
      await saveData();
      render();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

async function deleteCategory(catId) {
  const cat = findCategory(catId);
  if (!cat) return;
  if (!confirm(`Delete the "${cat.name}" category and all its products?`)) return;
  state.data.categories = state.data.categories.filter(c => c.id !== catId);
  if (state.activeCategory === catId) state.activeCategory = 'all';
  await saveData();
  render();
}

/* ---------- Product CRUD ---------- */
async function addProduct(catId) {
  const cat = findCategory(catId);
  if (!cat) return;
  const name = prompt('New product / variant name:');
  if (!name || !name.trim()) return;
  const desc = prompt('Short description:', '') || '';
  cat.products.push({ id: uid('prod'), name: name.trim(), desc: desc.trim() });
  await saveData();
  render();
}

async function editProduct(catId, prodId) {
  const cat = findCategory(catId);
  if (!cat) return;
  const prod = cat.products.find(p => (p.id || p.name) === prodId);
  if (!prod) return;
  const name = prompt('Product name:', prod.name);
  if (name === null) return;
  const desc = prompt('Description:', prod.desc);
  if (desc === null) return;
  prod.name = name.trim();
  prod.desc = desc.trim();
  await saveData();
  render();
}

async function deleteProduct(catId, prodId) {
  const cat = findCategory(catId);
  if (!cat) return;
  if (!confirm('Remove this product from the catalogue?')) return;
  cat.products = cat.products.filter(p => (p.id || p.name) !== prodId);
  await saveData();
  render();
}

async function editContact() {
  const c = state.data.contact;
  const phone = prompt('Phone number:', c.phone);
  if (phone === null) return;
  const email = prompt('Email address:', c.email);
  if (email === null) return;
  const website = prompt('Website:', c.website);
  if (website === null) return;
  c.phone = phone.trim();
  c.email = email.trim();
  c.website = website.trim();
  await saveData();
  render();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

function matchesQuery(cat, q) {
  if (!q) return true;
  q = q.toLowerCase();
  if (cat.name.toLowerCase().includes(q)) return true;
  if (cat.desc.toLowerCase().includes(q)) return true;
  return cat.products.some(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
}

async function init() {
  await loadData();
  render();
  onSnapshot(catalogDocRef, (snap) => {
    if (snap.exists() && snap.data() && snap.data().json) {
      const incoming = snap.data().json;
      if (incoming !== JSON.stringify(state.data)) {
        state.data = JSON.parse(incoming);
        render();
      }
    }
  }, (err) => console.error('Live sync error', err));
}
init();

/* Inline onclick="" handlers run in global scope, so expose the functions they need */
window.enterAdmin = enterAdmin;
window.exitAdmin = exitAdmin;
window.resetCatalog = resetCatalog;
window.addCategory = addCategory;
window.editCategoryText = editCategoryText;
window.editCategoryImage = editCategoryImage;
window.deleteCategory = deleteCategory;
window.addProduct = addProduct;
window.editProduct = editProduct;
window.deleteProduct = deleteProduct;
window.editContact = editContact;


function render() {
  const app = document.getElementById('app');
  const d = state.data;

  const cats = d.categories;

  const catsFiltered = state.activeCategory === 'all' ? cats : cats.filter(c=>c.id===state.activeCategory);
  const q = state.query.trim().toLowerCase();

  const sections = catsFiltered.map(cat => {
    let products = cat.products;
    if (q) {
      const catMatches = cat.name.toLowerCase().includes(q) || cat.desc.toLowerCase().includes(q);
      products = catMatches ? products : products.filter(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
    }
    return { cat, products };
  }).filter(s => q ? s.products.length > 0 : true);

  app.innerHTML = `
    <div class="topbar">
      <div class="wrap">
        <div class="topbar-row">
          <div class="brand">
            <img src="${LOGO_SRC}" alt="Vansh Labels">
          </div>
          <div class="topbar-actions">
            ${state.isAdmin
              ? `<button class="btn btn-line" onclick="resetCatalog()">Reset original</button><button class="btn btn-red" onclick="exitAdmin()">Done editing</button>`
              : `<button class="btn btn-line" onclick="enterAdmin()">Edit catalogue</button>`}
          </div>
        </div>
      </div>
    </div>

    <section class="hero">
      <div class="wrap">
        <h1>Every label, tag &amp;<br><span>trim</span> your brand needs.</h1>
        <p>One stop destination for all your label and tag needs — browse the full Vansh Labels range and get in touch for samples, pricing and orders.</p>
        <div class="search-row">
          <input id="searchInput" type="text" placeholder="Search hang tags, woven, satin, TPU…" value="${escapeHtml(state.query)}">
        </div>
        <div class="why-strip">
          ${d.whyChoose.map(w=>`<span>${escapeHtml(w)}</span>`).join('')}
        </div>
      </div>
    </section>

    <div class="filter-bar">
      <div class="wrap">
        <div class="chips">
          <div class="chip ${state.activeCategory==='all'?'active':''}" onclick="setActiveCat('all')">All (${cats.reduce((n,c)=>n+c.products.length,0)})</div>
          ${cats.map(c=>`<div class="chip ${state.activeCategory===c.id?'active':''}" onclick="setActiveCat('${c.id}')">${escapeHtml(c.name)} (${c.products.length})</div>`).join('')}
        </div>
      </div>
    </div>

    <main class="wrap">
      ${sections.length ? sections.map(s => renderSection(s.cat, s.products)).join('') : `<div class="empty-state">No products match your search.</div>`}
      ${state.isAdmin ? `<div class="add-cat-cta"><button class="btn btn-navy" onclick="addCategory()">+ Add new category</button></div>` : ''}
    </main>

    <footer>
      <div class="wrap">
        <div class="foot-row">
          <div class="brandline">Vansh Labels</div>
          <div>
            📞 ${escapeHtml(d.contact.phone)} &nbsp; ✉️ ${escapeHtml(d.contact.email)} &nbsp; 🌐 ${escapeHtml(d.contact.website)}
            ${state.isAdmin ? `<button class="btn btn-line" style="padding:4px 10px;margin-left:10px;" onclick="editContact()">Edit</button>` : ''}
          </div>
        </div>
        <div class="foot-note">This catalogue is for display purposes only — reach out directly for pricing, samples and orders.</div>
      </div>
    </footer>
    ${state.isAdmin ? `<div class="admin-fab-bar">✏️ Editing is on — visible to everyone<button class="btn btn-red" style="padding:6px 14px;" onclick="exitAdmin()">Done</button></div>` : ''}
  `;

  const input = document.getElementById('searchInput');
  if (input) input.addEventListener('input', (e)=>{ state.query = e.target.value; render(); });
}

function renderSection(cat, products) {
  return `
    <div id="${cat.id}">
      <div class="cat-card-header">
        ${IMG(cat.img)
          ? `<img src="${IMG(cat.img)}" alt="${escapeHtml(cat.name)}">`
          : `<div class="cat-icon-tile" style="background:${cat.color || '#334'};">${tagIconSVG()}</div>`}
        <div class="info">
          <h3>${escapeHtml(cat.name)}</h3>
          <p>${escapeHtml(cat.desc)}</p>
        </div>
        ${state.isAdmin ? `<div class="admin-actions">
          <button onclick="editCategoryImage('${cat.id}')">${IMG(cat.img) ? 'Change photo' : 'Add photo'}</button>
          <button onclick="editCategoryText('${cat.id}')">Edit</button>
          <button onclick="deleteCategory('${cat.id}')" style="color:#c0263a;">Delete</button>
        </div>` : ''}
      </div>
      <div class="grid">
        ${products.map(p => `
          <div class="card">
            <div class="thumb" style="${IMG(cat.img) ? '' : `background:${cat.color || '#334'};display:flex;align-items:center;justify-content:center;`}">
              ${IMG(cat.img) ? `<img src="${IMG(cat.img)}" alt="${escapeHtml(p.name)}">` : tagIconSVG()}
              <div class="badge">${escapeHtml(cat.name)}</div>
            </div>
            <div class="body">
              <p class="pname">${escapeHtml(p.name)}</p>
              <p class="pdesc">${escapeHtml(p.desc)}</p>
              ${state.isAdmin ? `<div class="admin-row">
                <button onclick="editProduct('${cat.id}','${p.id}')">Edit</button>
                <button onclick="deleteProduct('${cat.id}','${p.id}')">Delete</button>
              </div>` : ''}
            </div>
          </div>
        `).join('')}
        ${state.isAdmin ? `<div class="add-card" onclick="addProduct('${cat.id}')">+ Add product</div>` : ''}
      </div>
    </div>
  `;
}

function setActiveCat(id) {
  state.activeCategory = id;
  render();
}
window.setActiveCat = setActiveCat;
</script>
</body>
</html>
